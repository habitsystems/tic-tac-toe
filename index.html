<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exes and Os</title>
    <!--suppress CssUnusedSymbol -->
    <style>
        :root {
            --sun-left: 20vw;
            --sun-top: 20vh;
            --sun-opacity: 0.86;
            --star-size: 2px;
            --star-left: 50vw;
            --star-top: 16vh;
            --star-opacity: 0.8;
            --star-twinkle: 4s;
            --moon-left: 18vw;
            --moon-top: 12vh;
            --moon-rotation: 0deg;
            --planet-left: 50vw;
            --planet-top: 20vh;
            --planet-size: 5px;
            --planet-opacity: 0.9;
            --planet-glow: rgba(255,255,255,0.6);
            --weather-left: 50vw;
            --weather-speed: 1s;
            --weather-delay: 0s;
            --rain-length: 32px;
            --flake-size: 5px;
            --snow-drift: 8vw;
            --cloud-top: 12vh;
            --cloud-width: 180px;
            --cloud-height: 54px;
            --cloud-opacity: 0.7;
            --leaf-top: 54vh;
            --moth-speed: 9s;
            --moth-delay: 0s;
            --sleeping-bee-bottom: 58px;
            --sleeping-bee-left: 12vw;
            --snow-pile-left: 50vw;
            --snow-pile-bottom: 0px;
            --snow-pile-width: 140px;
            --snow-pile-height: 28px;
        }
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            transition: background-color 0.5s, color 0.5s;
            padding: 20px;
            box-sizing: border-box;
        }
        body.hard-mode-active {
            background-color: #140807;
            color: #d7b46a;
            background-image:
                linear-gradient(90deg, rgba(92, 7, 12, 0.92) 0 8%, rgba(32, 5, 7, 0.96) 8% 14%, rgba(119, 10, 16, 0.86) 14% 22%),
                linear-gradient(135deg, rgba(29, 49, 32, 0.72) 0 18%, transparent 18% 36%, rgba(12, 24, 17, 0.76) 36% 54%, transparent 54%),
                radial-gradient(circle at 50% 24%, rgba(214, 176, 91, 0.14), transparent 34%),
                linear-gradient(#160807, #060403 70%);
            background-size: 180px 100%, 120px 120px, 100% 100%, 100% 100%;
        }
        body.hard-mode-active h1 {
            color: #d0a04e;
            text-shadow: 0 2px 0 #1b0505, 0 0 18px rgba(126, 13, 19, 0.9);
            animation: glitch 0.8s infinite alternate;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        body.hard-mode-active .cell {
            background-color: #21100d;
            color: #f2d48b;
            border-color: #7c1719;
            box-shadow: inset 0 0 0 2px rgba(9, 30, 17, 0.45);
            transition: all 0.2s;
        }
        body.hard-mode-active .cell:hover {
            background-color: #341614;
            box-shadow: 0 0 14px rgba(183, 28, 28, 0.85), inset 0 0 0 2px rgba(215, 180, 106, 0.35);
        }
        body.hard-mode-active .layer {
            background-color: #080403;
            border-color: #7c1719;
        }
        body.hard-mode-active .score-container {
            background-color: rgba(5, 3, 2, 0.96);
            border: 3px solid #d7b46a;
            color: #f7e7b3;
            box-shadow: 0 0 0 2px rgba(28, 5, 5, 0.95), 0 0 18px rgba(215, 180, 106, 0.24), inset 0 0 24px rgba(92, 7, 12, 0.38);
        }
        body.hard-mode-active .score-header {
            color: #ffe39a;
            text-shadow: 0 2px 0 #230504, 0 0 10px rgba(255, 227, 154, 0.45);
        }
        /* Twitchy effect for random elements */
        @keyframes twitch {
            0% { opacity: 1; transform: scale(1); }
            1% { opacity: 0.8; transform: scale(1.01) translateX(1px); }
            2% { opacity: 1; transform: scale(1); }
            50% { opacity: 1; transform: scale(1); }
            51% { opacity: 0.9; transform: scale(0.99) skewX(2deg); }
            52% { opacity: 1; transform: scale(1); }
        }
        body.hard-mode-active #game-container {
            animation: twitch 4s infinite;
        }
        /* Meadow theme for flower mode */
        body.meadow-active {
            --meadow-sky-top: #bdefff;
            --meadow-sky-bottom: #e8fbff;
            --meadow-grass: #9ccc65;
            --meadow-sun-color: rgba(255, 249, 196, 0.92);
            --meadow-cloud-opacity: 0;
            --meadow-text-color: #243124;
            --meadow-text-shadow: 0 1px 0 rgba(255,255,255,0.65);
            background-color: var(--meadow-sky-bottom);
            color: var(--meadow-text-color);
            background-image: 
                radial-gradient(ellipse at 70% 18%, rgba(255,255,255,var(--meadow-cloud-opacity)) 0 10%, transparent 24%),
                linear-gradient(to bottom, var(--meadow-sky-top) 0%, var(--meadow-sky-bottom) 60%, var(--meadow-grass) 60%);
            overflow: hidden;
            transition: background-color 2s, background-image 2s;
        }
        #meadow-sky-layer,
        #meadow-weather-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        #meadow-sky-layer {
            z-index: 0;
            overflow: hidden;
            height: 60vh;
            bottom: auto;
        }
        #meadow-weather-layer {
            z-index: 0;
            overflow: hidden;
        }
        body.meadow-active #meadow-sky-layer {
            opacity: 1;
        }
        body.meadow-active h1,
        body.meadow-active #game-container,
        body.meadow-active #controls-3d,
        body.meadow-active #status,
        body.meadow-active .button-container,
        body.meadow-active #debug-panel {
            position: relative;
            z-index: 1;
        }
        .meadow-sun {
            position: absolute;
            left: var(--sun-left, 20vw);
            top: var(--sun-top, 20vh);
            width: 112px;
            height: 112px;
            border-radius: 50%;
            background: #fff6b2;
            box-shadow: 0 0 48px rgba(255, 227, 137, 0.72), 0 0 120px rgba(255, 178, 91, 0.38);
            opacity: var(--sun-opacity, 0.86);
            transform: translate(-50%, -50%);
        }
        .meadow-star {
            position: absolute;
            width: var(--star-size, 2px);
            height: var(--star-size, 2px);
            left: var(--star-left);
            top: var(--star-top);
            border-radius: 50%;
            background: rgba(255,255,255,var(--star-opacity,0.8));
            box-shadow: 0 0 6px rgba(255,255,255,0.45);
            animation: star-twinkle var(--star-twinkle, 4s) ease-in-out infinite;
        }
        .meadow-constellation-star {
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 8px rgba(255,255,255,0.75);
        }
        .meadow-moon {
            position: absolute;
            left: var(--moon-left, 18vw);
            top: var(--moon-top, 12vh);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #f4f0d2;
            box-shadow: 0 0 24px rgba(242, 239, 205, 0.5), inset -8px -8px 12px rgba(172, 162, 119, 0.2);
            opacity: 0.95;
            overflow: hidden;
            transform: translate(-50%, -50%) rotate(var(--moon-rotation, 0deg));
        }
        .meadow-moon::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 38%, rgba(120,112,88,0.25) 0 5%, transparent 6%),
                radial-gradient(circle at 62% 57%, rgba(120,112,88,0.22) 0 4%, transparent 5%),
                radial-gradient(circle at 47% 70%, rgba(120,112,88,0.18) 0 3%, transparent 4%);
            z-index: 2;
        }
        .meadow-moon::after {
            content: "";
            position: absolute;
            top: -4px;
            width: 76px;
            height: 80px;
            border-radius: 50%;
            background: #121c3f;
            opacity: var(--moon-shadow-opacity, 0);
            left: var(--moon-shadow-left, 0);
            transform: scaleX(var(--moon-shadow-scale, 1));
            z-index: 1;
        }
        .meadow-moon.daylight {
            background: rgba(247, 246, 225, 0.58);
            box-shadow: 0 0 10px rgba(255,255,255,0.22), inset -5px -6px 10px rgba(166, 160, 133, 0.13);
            opacity: 0.68;
        }
        .meadow-moon.daylight::before {
            opacity: 0.42;
        }
        .meadow-moon.daylight::after {
            background: var(--meadow-sky-top, #aeeeff);
            opacity: var(--moon-shadow-opacity, 0);
        }
        .meadow-moon.phase-new {
            background: #182141;
            box-shadow: 0 0 12px rgba(242, 239, 205, 0.15);
        }
        .meadow-moon.daylight.phase-new {
            background: rgba(235, 237, 221, 0.24);
            box-shadow: none;
        }
        .meadow-moon.phase-new::after,
        .meadow-moon.phase-full::after {
            opacity: 0;
        }
        .meadow-moon.phase-waxing-crescent {
            --moon-shadow-opacity: 0.56;
            --moon-shadow-left: -18px;
            --moon-shadow-scale: 1.05;
        }
        .meadow-moon.phase-first-quarter {
            --moon-shadow-opacity: 0.58;
            --moon-shadow-left: -39px;
            --moon-shadow-scale: 0.78;
        }
        .meadow-moon.phase-waxing-gibbous {
            --moon-shadow-opacity: 0.5;
            --moon-shadow-left: -58px;
            --moon-shadow-scale: 0.54;
        }
        .meadow-moon.phase-waning-gibbous {
            --moon-shadow-opacity: 0.5;
            --moon-shadow-left: 54px;
            --moon-shadow-scale: 0.54;
        }
        .meadow-moon.phase-last-quarter {
            --moon-shadow-opacity: 0.58;
            --moon-shadow-left: 35px;
            --moon-shadow-scale: 0.78;
        }
        .meadow-moon.phase-waning-crescent {
            --moon-shadow-opacity: 0.56;
            --moon-shadow-left: 14px;
            --moon-shadow-scale: 1.05;
        }
        .meadow-planet {
            position: absolute;
            left: var(--planet-left, 50vw);
            top: var(--planet-top, 20vh);
            width: var(--planet-size, 5px);
            height: var(--planet-size, 5px);
            border-radius: 50%;
            background: currentColor;
            opacity: var(--planet-opacity, 0.9);
            box-shadow: 0 0 8px var(--planet-glow, rgba(255,255,255,0.6));
            transform: translate(-50%, -50%);
        }
        .meadow-planet.mercury {
            color: #d7c6a4;
        }
        .meadow-planet.venus {
            color: #fff3b0;
            box-shadow: 0 0 13px rgba(255,243,176,0.9), 0 0 25px rgba(255,243,176,0.42);
        }
        .meadow-planet.mars {
            color: #ff9a6b;
            box-shadow: 0 0 10px rgba(255,116,77,0.78);
        }
        .meadow-planet.jupiter {
            color: #ffe4b8;
            box-shadow: 0 0 12px rgba(255,228,184,0.8);
        }
        .meadow-planet.saturn {
            color: #f0d39a;
        }
        .weather-drop,
        .weather-flake,
        .weather-fog-bank,
        .weather-cloud,
        .weather-leaf,
        .weather-lightning {
            position: absolute;
            display: none;
        }
        .weather-cloud {
            z-index: 1;
        }
        .weather-drop,
        .weather-flake,
        .weather-leaf,
        .weather-lightning {
            z-index: 2;
        }
        .weather-fog-bank {
            z-index: 3;
        }
        body.meadow-active.meadow-weather-rain #meadow-weather-layer,
        body.meadow-active.meadow-weather-snow #meadow-weather-layer,
        body.meadow-active.meadow-weather-fog #meadow-weather-layer,
        body.meadow-active.meadow-weather-storm #meadow-weather-layer,
        body.meadow-active.meadow-weather-cloudy #meadow-weather-layer,
        body.meadow-active.meadow-weather-windy #meadow-weather-layer {
            opacity: 1;
        }
        body.meadow-active.meadow-weather-rain .weather-drop,
        body.meadow-active.meadow-weather-storm .weather-drop {
            display: block;
            top: -18vh;
            left: var(--weather-left);
            width: 2px;
            height: var(--rain-length, 32px);
            background: linear-gradient(to bottom, rgba(173,213,244,0), rgba(67,120,166,0.8));
            transform: rotate(14deg);
            animation: rain-fall var(--weather-speed, 0.72s) linear infinite;
            animation-delay: var(--weather-delay);
        }
        body.meadow-active.meadow-weather-storm .weather-drop {
            height: var(--rain-length, 42px);
            background: linear-gradient(to bottom, rgba(188,219,245,0), rgba(31,63,102,0.95));
        }
        body.meadow-active.meadow-weather-snow .weather-flake {
            display: block;
            top: -10vh;
            left: var(--weather-left);
            width: var(--flake-size, 5px);
            height: var(--flake-size, 5px);
            border-radius: 50%;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 2px rgba(80,120,160,0.45);
            animation: snow-fall var(--weather-speed, 6s) linear infinite;
            animation-delay: var(--weather-delay);
        }
        body.meadow-active.meadow-weather-snow .weather-flake::before,
        body.meadow-active.meadow-weather-snow .weather-flake::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 140%;
            height: 1px;
            background: rgba(255,255,255,0.86);
            transform: translate(-50%, -50%) rotate(60deg);
        }
        body.meadow-active.meadow-weather-snow .weather-flake::after {
            transform: translate(-50%, -50%) rotate(-60deg);
        }
        .snow-pile {
            position: fixed;
            left: var(--snow-pile-left, 50vw);
            bottom: var(--snow-pile-bottom, 0px);
            width: var(--snow-pile-width, 140px);
            height: var(--snow-pile-height, 28px);
            border-radius: 50% 50% 18% 18%;
            background:
                radial-gradient(circle at 18% 42%, rgba(255,255,255,0.98) 0 18%, transparent 19%),
                radial-gradient(circle at 46% 30%, rgba(255,255,255,0.96) 0 23%, transparent 24%),
                radial-gradient(circle at 74% 46%, rgba(255,255,255,0.94) 0 19%, transparent 20%),
                linear-gradient(to bottom, rgba(255,255,255,0.98), rgba(220,238,247,0.94));
            box-shadow: 0 -2px 10px rgba(255,255,255,0.7), inset 0 -8px 12px rgba(150,178,195,0.16);
            opacity: 0.96;
            pointer-events: none;
            z-index: 4;
            transform: translateX(-50%) scaleY(0);
            transform-origin: bottom center;
            animation: snow-pile-grow 4s ease-out forwards;
        }
        .snow-clear-sign {
            position: fixed;
            right: 24px;
            bottom: 34px;
            width: 86px;
            height: 106px;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
            z-index: 9;
        }
        .snow-clear-sign::before {
            content: "";
            position: absolute;
            left: 40px;
            bottom: 0;
            width: 10px;
            height: 62px;
            border-radius: 4px;
            background: linear-gradient(90deg, #5f3b22, #8b5a32 48%, #4a2b18);
            box-shadow: 2px 0 0 rgba(0,0,0,0.16);
        }
        .snow-clear-sign-board {
            position: absolute;
            left: 0;
            top: 0;
            width: 86px;
            height: 54px;
            border-radius: 7px;
            background: #f6e0a6;
            border: 4px solid #6d4729;
            box-shadow: 0 5px 8px rgba(0,0,0,0.22), inset 0 0 0 2px rgba(255,255,255,0.32);
            color: #3c2819;
            font-family: Impact, "Arial Black", sans-serif;
            font-weight: 900;
            font-size: 42px;
            line-height: 46px;
            text-align: center;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.6), -1px 2px 0 rgba(109,71,41,0.24);
            transform: rotate(-3deg);
        }
        .snow-clear-sign-board::before {
            content: "";
            position: absolute;
            right: 8px;
            bottom: 9px;
            width: 32px;
            height: 16px;
            border-radius: 5px;
            background: #8fd5f2;
            border: 3px solid #315f73;
            box-shadow: inset 0 -5px 0 rgba(49,95,115,0.25);
        }
        .snow-clear-sign-board::after {
            content: "";
            position: absolute;
            right: -2px;
            bottom: 8px;
            width: 18px;
            height: 22px;
            border-radius: 3px 10px 10px 3px;
            background: #d7e3e8;
            border: 3px solid #607d8b;
            transform: skewX(-17deg);
        }
        .snow-clear-sign:hover .snow-clear-sign-board {
            transform: rotate(-1deg) translateY(-2px);
        }
        body.meadow-active.meadow-weather-fog .weather-fog-bank {
            display: block;
            left: -20vw;
            width: 140vw;
            height: 22vh;
            border-radius: 50%;
            background: rgba(234, 241, 236, 0.42);
            filter: blur(18px);
            animation: fog-drift var(--weather-speed, 12s) ease-in-out infinite alternate;
            animation-delay: var(--weather-delay);
        }
        body.meadow-active.meadow-weather-cloudy .weather-cloud,
        body.meadow-active.meadow-weather-rain .weather-cloud,
        body.meadow-active.meadow-weather-storm .weather-cloud,
        body.meadow-active.meadow-weather-snow .weather-cloud {
            display: block;
            top: var(--cloud-top);
            left: -28vw;
            width: var(--cloud-width, 180px);
            height: var(--cloud-height, 54px);
            border-radius: 999px;
            background:
                radial-gradient(circle at 25% 25%, rgba(255,255,255,0.82) 0 24%, transparent 25%),
                radial-gradient(circle at 50% 12%, rgba(255,255,255,0.78) 0 30%, transparent 31%),
                radial-gradient(circle at 74% 32%, rgba(255,255,255,0.72) 0 25%, transparent 26%),
                rgba(255,255,255,0.48);
            filter: blur(1px);
            opacity: var(--cloud-opacity, 0.7);
            animation: cloud-drift var(--weather-speed, 42s) linear infinite;
            animation-delay: var(--weather-delay);
        }
        body.meadow-active.meadow-weather-snow .weather-cloud {
            opacity: 0.3;
        }
        body.meadow-active.meadow-weather-storm .weather-cloud {
            background:
                radial-gradient(circle at 25% 25%, rgba(64,72,86,0.9) 0 24%, transparent 25%),
                radial-gradient(circle at 50% 12%, rgba(48,55,70,0.92) 0 30%, transparent 31%),
                radial-gradient(circle at 74% 32%, rgba(40,48,62,0.9) 0 25%, transparent 26%),
                rgba(33,40,54,0.82);
            opacity: 0.82;
        }
        body.meadow-active.meadow-weather-windy .weather-leaf {
            display: block;
            top: var(--leaf-top);
            left: -8vw;
            width: 14px;
            height: 8px;
            border-radius: 70% 0 70% 0;
            background: #6b8f38;
            animation: leaf-gust var(--weather-speed, 3.8s) ease-in-out infinite;
            animation-delay: var(--weather-delay);
        }
        body.meadow-active.meadow-weather-storm .weather-lightning {
            display: block;
            top: 10vh;
            left: var(--weather-left);
            width: 4px;
            height: 88px;
            background: #fff4a8;
            clip-path: polygon(45% 0, 100% 0, 62% 42%, 100% 42%, 28% 100%, 48% 52%, 10% 52%);
            opacity: 0;
            animation: lightning-flash 5.5s steps(1) infinite;
            animation-delay: var(--weather-delay);
            filter: drop-shadow(0 0 18px rgba(255,244,168,0.95));
        }
        body.meadow-active.meadow-dawn {
            --meadow-sky-top: #ffd1a8;
            --meadow-sky-bottom: #dff4ff;
            --meadow-grass: #8fc764;
            --meadow-sun-color: rgba(255, 218, 138, 0.95);
            --meadow-cloud-opacity: 0.28;
            --meadow-text-color: #283620;
        }
        body.meadow-active.meadow-day {
            --meadow-sky-top: #aeeeff;
            --meadow-sky-bottom: #e5fbff;
            --meadow-grass: #9ccc65;
            --meadow-sun-color: rgba(255, 249, 196, 0.96);
            --meadow-cloud-opacity: 0.18;
            --meadow-text-color: #243124;
        }
        body.meadow-active.meadow-dusk {
            --meadow-sky-top: #f4a36f;
            --meadow-sky-bottom: #9fc0de;
            --meadow-grass: #7ea951;
            --meadow-sun-color: rgba(255, 184, 103, 0.88);
            --meadow-cloud-opacity: 0.32;
            --meadow-text-color: #fff1c2;
            --meadow-text-shadow: 0 2px 4px rgba(32,18,12,0.78), 0 0 10px rgba(255,198,125,0.25);
        }
        body.meadow-active.meadow-night {
            --meadow-sky-top: #111b3d;
            --meadow-sky-bottom: #26385f;
            --meadow-grass: #456c38;
            --meadow-sun-color: transparent;
            --meadow-cloud-opacity: 0.16;
            --meadow-text-color: #f2f6dc;
            --meadow-text-shadow: 0 2px 4px rgba(0,0,0,0.95), 0 0 12px rgba(255,255,210,0.22);
            color: #d8e5d0;
            background-image:
                radial-gradient(circle at 78% 15%, rgba(255,255,255,0.55) 0 1px, transparent 2px),
                radial-gradient(circle at 62% 26%, rgba(255,255,255,0.45) 0 1px, transparent 2px),
                radial-gradient(circle at 36% 12%, rgba(255,255,255,0.45) 0 1px, transparent 2px),
                linear-gradient(to bottom, var(--meadow-sky-top) 0%, var(--meadow-sky-bottom) 60%, var(--meadow-grass) 60%);
        }
        body.meadow-active h1,
        body.meadow-active #status,
        body.meadow-active .score-header,
        body.meadow-active label {
            color: var(--meadow-text-color);
            text-shadow: var(--meadow-text-shadow);
        }
        body.meadow-active.meadow-weather-cloudy {
            --meadow-cloud-opacity: 0.58;
            --meadow-sun-color: rgba(255, 249, 196, 0.52);
        }
        body.meadow-active.meadow-weather-rain {
            --meadow-cloud-opacity: 0.62;
        }
        body.meadow-active.meadow-weather-snow {
            --meadow-grass: #c9dfbd;
            --meadow-cloud-opacity: 0.48;
        }
        body.meadow-active.meadow-weather-fog {

            transform: rotate(var(--pile-tilt, 0deg));
            opacity: 1;
        }
        .money-cleanup-z {
            position: fixed;
            font-size: 50px;
            line-height: 1;
            height: 50px;
            padding: 0;
            border: 0;
            background: transparent;
            color: #111827;
            opacity: 0.045;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
            z-index: 12;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .money-cleanup-z:hover {
            opacity: 0.12;
            transform: scale(1.06);
        }
        .money-sweeper {
            --sweeper-start: -360px;
            --sweeper-end: calc(100vw + 360px);
            position: fixed;
            bottom: 8px;
            left: 0;
            width: 320px;
            height: 128px;
            pointer-events: none;
            z-index: 11;
            animation: money-sweeper-drive 9s linear forwards;
            will-change: transform;
        }
        .money-sweeper.snow-sweeper {
            bottom: 2px;
            z-index: 12;
        }
        .money-sweeper-body {
            position: absolute;
            left: 64px;
            bottom: 32px;
            width: 176px;
            height: 68px;
            background: #d9f2ff;
            border: 6px solid #2f6f8f;
            border-radius: 16px 16px 10px 10px;
            box-shadow: inset 0 -16px 0 rgba(47, 111, 143, 0.18);
        }
        .money-sweeper-cab {
            position: absolute;
            left: 150px;
            bottom: 92px;
            width: 76px;
            height: 56px;
            background: #f8fbff;
            border: 6px solid #2f6f8f;
            border-radius: 14px 14px 6px 6px;
        }
        .money-sweeper-plow {
            position: absolute;
            left: 236px;
            bottom: 16px;
            width: 76px;
            height: 92px;
            background: #cfd8dc;
            border: 6px solid #607d8b;
            border-radius: 10px 24px 24px 10px;
            transform: skewX(-15deg);
        }
        .money-sweeper-wheel {
            position: absolute;
            bottom: 12px;
            width: 40px;
            height: 40px;
            background: #263238;
            border: 8px solid #78909c;
            border-radius: 50%;
        }
        .money-sweeper-wheel.front {
            left: 192px;
        }
        .money-sweeper-wheel.back {
            left: 80px;
        }
        @keyframes money-fall {
            0% {
                transform: translate3d(0, 0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate3d(var(--money-drift, 0px), calc(100vh - var(--money-ground-offset, 70px)), 0) rotate(16deg);
                opacity: 1;
            }
        }
        @keyframes money-sweeper-drive {
            from {
                transform: translateX(var(--sweeper-start));
            }
            to {
                transform: translateX(var(--sweeper-end));
            }
        }
        @keyframes snow-pile-grow {
            from {
                transform: translateX(-50%) scaleY(0.18);
                opacity: 0.35;
            }
            to {
                transform: translateX(-50%) scaleY(1);
                opacity: 0.96;
            }
        }
        body.meadow-wilted .tree-trunk {
            background: #3e2723;
        }
        body.meadow-wilted .tree-foliage {
            background: #3e2723;
            opacity: 0.7;
        }
        body:not(.meadow-active) .tree {
            opacity: 0;
        }
        /* Double exposure effect simulation */
        body.hard-mode-active::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1000;
        }
        body.hard-mode-active::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, black 150%);
            pointer-events: none;
            z-index: 1001;
        }
        .monster {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 999;
            opacity: 0.6;
            filter: grayscale(1) contrast(1.5) brightness(0.5) sepia(1) hue-rotate(-50deg);
            animation: monster-twitch 5s infinite;
        }
        @keyframes monster-twitch {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(2px, -2px) rotate(5deg); }
            20% { transform: translate(-2px, 1px) rotate(-5deg); }
            30% { transform: translate(1px, -1px) rotate(2deg); }
            40% { transform: translate(-1px, 2px) rotate(-3deg); }
        }
        .score-header {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }
        .score-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
        }
        #game-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            perspective: 1200px;
            width: 100%;
            flex-wrap: wrap;
            padding: 20px;
            box-sizing: border-box;
        }
        .score-container {
            width: 150px;
            height: 150px;
            background: #fff;
            border: 2px solid #333;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 5px;
            overflow-y: auto;
        }
        .tally-group {
            display: inline-block;
            position: relative;
            width: 30px;
            height: 40px;
            margin-right: 5px;
        }
        .tally-mark {
            position: absolute;
            width: 3px;
            height: 30px;
            background: #000;
            border-radius: 2px;
            transition: background-color 0.3s;
        }
        /* Mode-based color coding */
        .tally-mark.mode-default { background: #000; }
        .tally-mark.mode-misere { background: #d9534f; } /* Reddish */
        .tally-mark.mode-4x4 { background: #0275d8; }     /* Blue */
        .tally-mark.mode-3d { background: #5cb85c; }      /* Green */
        .tally-mark.mode-4x4x4 { background: #5bc0de; }   /* Cyan/Purple-ish */
        body.hard-mode-active .tally-mark {
            box-shadow: 0 0 5px rgba(255, 227, 154, 0.5);
        }
        body.hard-mode-active .tally-mark.mode-default { background: #ffe39a; }
        body.hard-mode-active .tally-mark.mode-misere { background: #ff6b5f; }
        body.hard-mode-active .tally-mark.mode-4x4 { background: #7db7ff; }
        body.hard-mode-active .tally-mark.mode-3d { background: #94e68f; }
        body.hard-mode-active .tally-mark.mode-4x4x4 { background: #8be8f2; }

        .tally-mark:nth-child(1) { left: 5px; transform: rotate(2deg); }
        .tally-mark:nth-child(2) { left: 13px; transform: rotate(-1deg); }
        .tally-mark:nth-child(3) { left: 21px; transform: rotate(1.5deg); }
        .tally-mark:nth-child(4) { left: 29px; transform: rotate(-2.5deg); }
        .tally-mark.diagonal {
            height: 38px;
            width: 3px;
            transform: rotate(-75deg);
            left: 17px;
            top: -2px;
        }
        .layer-container {
            display: flex;
            gap: 20px;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }
        .layer-container.mode-3d {
            position: relative;
            width: 200px;
            height: 200px;
            display: block;
            margin: 40px;
        }
        .layer-container.mode-3d .layer-wrapper {
            position: absolute;
            top: 0;
            left: 0;
        }
        .layer-container.mode-3d #wrapper-0 { transform: translateZ(60px); }
        .layer-container.mode-3d #wrapper-1 { transform: translateZ(0); }
        .layer-container.mode-3d #wrapper-2 { transform: translateZ(-60px); }
        .layer-container.mode-3d #wrapper-3 { transform: translateZ(-120px); }

        .layer-container.mode-4x4x4 {
            position: relative;
            width: 260px;
            height: 260px;
            display: block;
            margin: 60px;
        }
        .layer-container.mode-4x4x4 .layer-wrapper {
            position: absolute;
            top: 0;
            left: 0;
        }
        .layer-container.mode-4x4x4 #wrapper-0 { transform: translateZ(90px); }
        .layer-container.mode-4x4x4 #wrapper-1 { transform: translateZ(30px); }
        .layer-container.mode-4x4x4 #wrapper-2 { transform: translateZ(-30px); }
        .layer-container.mode-4x4x4 #wrapper-3 { transform: translateZ(-90px); }

        .layer {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            background-color: #333;
            border: 3px solid #333;
        }
        .layer.size-4 {
            grid-template-columns: repeat(4, 60px);
            grid-template-rows: repeat(4, 60px);
        }
        .cell {
            width: 60px;
            height: 60px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .cell:hover {
            background-color: #eee;
        }
        .cell.winning-cell {
            color: #d9534f;
            position: relative;
        }
        .cell.winning-cell::after {
            content: '';
            position: absolute;
            background-color: #d9534f;
            z-index: 10;
        }
        /* Horizontal line */
        .cell.winning-cell.win-horizontal::after {
            width: 100%;
            height: 4px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
        /* Vertical line */
        .cell.winning-cell.win-vertical::after {
            width: 4px;
            height: 100%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        /* Diagonal line (top-left to bottom-right) */
        .cell.winning-cell.win-diagonal-1::after {
            width: 140%;
            height: 4px;
            top: 50%;
            left: -20%;
            transform: translateY(-50%) rotate(45deg);
        }
        /* Diagonal line (top-right to bottom-left) */
        .cell.winning-cell.win-diagonal-2::after {
            width: 140%;
            height: 4px;
            top: 50%;
            left: -20%;
            transform: translateY(-50%) rotate(-45deg);
        }
        /* 3D and other wins - just a generic highlight if it doesn't fit the above */
        .cell.winning-cell.win-generic::after {
            width: 80%;
            height: 80%;
            border: 4px solid #d9534f;
            border-radius: 50%;
            top: 10%;
            left: 10%;
        }

        #hard-mode-container {
            position: fixed;
            font-size: 0.5rem;
            color: rgba(0, 0, 0, 0.05);
            padding: 5px;
            z-index: 2000;
            cursor: pointer;
            user-select: none;
            transition: all 0.5s;
        }
        #hard-mode-container input {
            opacity: 0.1;
            width: 8px;
            height: 8px;
        }
        body.hard-mode-active #hard-mode-container {
            color: rgba(139, 0, 0, 0.1);
        }
        #status {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .button-container {
            height: 50px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
        }
        #message-overlay {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            z-index: 3000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        body.hard-mode-active #message-overlay {
            background: rgba(139, 0, 0, 0.9);
            color: #000;
            font-family: serif;
            font-weight: bold;
            box-shadow: 0 0 20px #8b0000;
        }
        #debug-panel {
            display: none;
            width: min(760px, calc(100vw - 40px));
            margin-top: 24px;
            border: 1px solid #777;
            background: rgba(255,255,255,0.94);
            color: #222;
            text-align: left;
            z-index: 20;
        }
        #debug-panel summary {
            cursor: pointer;
            padding: 10px 12px;
            font-weight: 700;
            user-select: none;
        }
        .debug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            padding: 0 12px 12px;
        }
        .debug-group {
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .debug-group-title {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .debug-group label {
            display: block;
            margin: 5px 0;
            font-size: 0.9rem;
        }
        .debug-group select,
        .debug-group input[type="time"] {
            width: 100%;
            box-sizing: border-box;
            margin-top: 4px;
        }
        body.hard-mode-active #debug-panel {
            background: rgba(8, 4, 3, 0.96);
            color: #f7e7b3;
            border-color: #d7b46a;
        }
        /* Responsive adjustments */
        @media (max-width: 600px) {
            #game-container {
                flex-direction: column;
                gap: 20px;
            }
            .score-wrapper {
                flex-direction: row;
                gap: 10px;
                align-items: center;
            }
            .score-container {
                width: 120px;
                height: 80px;
            }
            .score-header {
                margin-bottom: 0;
                width: 80px;
                font-size: 1rem;
            }
            .cell {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            .layer {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
            }
            .layer.size-4 {
                grid-template-columns: repeat(4, 50px);
                grid-template-rows: repeat(4, 50px);
            }
            .layer-container.mode-3d {
                width: 160px;
                height: 160px;
                margin: 30px;
            }
            .layer-container.mode-4x4x4 {
                width: 210px;
                height: 210px;
                margin: 40px;
            }
            h1 {
                font-size: 1.5rem;
                margin: 10px 0;
            }
            #status {
                font-size: 1rem;
            }
            .button-container {
                flex-direction: column;
                height: auto;
                gap: 10px;
            }
            button {
                width: 100%;
                max-width: 200px;
            }
            .tree-trunk {
                width: 30px !important;
            }
            .tree.growing .tree-trunk {
                height: 300px !important;
            }
            .tree.growing .tree-foliage {
                width: 120px !important;
                height: 120px !important;
                font-size: 2.5rem !important;
            }
            .tree-foliage.main {
                top: -60px !important;
                left: -45px !important;
            }
            .tree-branch.left .tree-foliage, .tree-branch.right .tree-foliage {
                top: -55px !important;
                right: -60px !important;
            }
            .tree.growing .tree-branch {
                width: 80px !important;
            }
        }

        /* Landscape orientation on mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-around;
                padding: 10px;
            }
            #game-container {
                width: auto;
                flex-direction: row;
            }
            h1 {
                width: 100%;
                font-size: 1.2rem;
                margin: 5px 0;
            }
            .score-container {
                height: 100px;
                width: 100px;
            }
            .cell {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .layer {
                grid-template-columns: repeat(3, 40px);
                grid-template-rows: repeat(3, 40px);
            }
            .layer.size-4 {
                grid-template-columns: repeat(4, 40px);
                grid-template-rows: repeat(4, 40px);
            }
            .layer-container.mode-3d {
                width: 130px;
                height: 130px;
                margin: 20px;
            }
            .layer-container.mode-4x4x4 {
                width: 170px;
                height: 170px;
                margin: 30px;
            }
            .button-container {
                width: 100%;
                height: 40px;
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div id="message-overlay"></div>
    <div id="meadow-sky-layer" aria-hidden="true"></div>
    <div id="meadow-weather-layer" aria-hidden="true"></div>
    <h1 id="game-title">Tic-Tac-Toe</h1>
    <div id="game-container">
        <div class="score-wrapper">
            <div id="player-label" class="score-header">Player</div>
            <div id="score-player" class="score-container"></div>
        </div>
        <div id="cube" class="layer-container">
            <div id="wrapper-0" class="layer-wrapper">
                <div class="layer" id="layer-0">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
            </div>
            <div id="wrapper-1" class="layer-wrapper">
                <div class="layer" id="layer-1">
                    <div class="cell" data-index="9"></div>
                    <div class="cell" data-index="10"></div>
                    <div class="cell" data-index="11"></div>
                    <div class="cell" data-index="12"></div>
                    <div class="cell" data-index="13"></div>
                    <div class="cell" data-index="14"></div>
                    <div class="cell" data-index="15"></div>
                    <div class="cell" data-index="16"></div>
                    <div class="cell" data-index="17"></div>
                </div>
            </div>
            <div id="wrapper-2" class="layer-wrapper">
                <div class="layer" id="layer-2">
                    <div class="cell" data-index="18"></div>
                    <div class="cell" data-index="19"></div>
                    <div class="cell" data-index="20"></div>
                    <div class="cell" data-index="21"></div>
                    <div class="cell" data-index="22"></div>
                    <div class="cell" data-index="23"></div>
                    <div class="cell" data-index="24"></div>
                    <div class="cell" data-index="25"></div>
                    <div class="cell" data-index="26"></div>
                </div>
            </div>
            <div id="wrapper-3" class="layer-wrapper" style="display: none;">
                <div class="layer" id="layer-3">
                    <!-- Cells will be added dynamically or pre-populated -->
                </div>
            </div>
        </div>
        <div class="score-wrapper">
            <div class="score-header">Computer</div>
            <div id="score-computer" class="score-container"></div>
        </div>
    </div>
    <div id="controls-3d" style="display: none; margin-top: 10px;">
        <button id="rotate-up">↑</button>
        <div>
            <button id="rotate-left">←</button>
            <button id="rotate-down">↓</button>
            <button id="rotate-right">→</button>
        </div>
    </div>
    <div id="status">Player X's turn</div>
    <div style="margin-top: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
        <label id="misere-container" style="display: none;">
            <input type="checkbox" id="misere-toggle"> Misère Mode
        </label>
        <label id="mode-4x4-container" style="display: none;">
            <input type="checkbox" id="mode-4x4-toggle"> 4x4 Mode
        </label>
        <label id="mode-3d-container" style="display: none;">
            <input type="checkbox" id="mode-3d-toggle"> 3D Mode
        </label>
        <label id="mode-4x4x4-container" style="display: none;">
            <input type="checkbox" id="mode-4x4x4-toggle"> 4x4x4 Mode
        </label>
        <label id="hard-mode-container">
            <input type="checkbox" id="hard-mode-toggle"> Hard Mode
        </label>
    </div>
    <div class="button-container">
        <button id="reset" style="visibility: hidden;">Reset Game</button>
        <button id="reset-scores" style="background-color: #ffcccc;">Reset All Scores</button>
    </div>
    <details id="debug-panel">
        <summary>Local Debug</summary>
        <div class="debug-grid">
            <div class="debug-group">
                <span class="debug-group-title">Game Modes</span>
                <label><input type="checkbox" id="debug-misere"> Misère</label>
                <label><input type="checkbox" id="debug-4x4"> 4x4</label>
                <label><input type="checkbox" id="debug-3d"> 3D</label>
                <label><input type="checkbox" id="debug-4x4x4"> 4x4x4</label>
                <label><input type="checkbox" id="debug-hard-mode"> Hard mode</label>
            </div>
            <div class="debug-group">
                <span class="debug-group-title">Features</span>
                <label><input type="checkbox" id="debug-meadow"> Meadow</label>
                <label><input type="checkbox" id="debug-monsters"> Monsters</label>
                <label><input type="checkbox" id="debug-tree"> Tree</label>
                <label><input type="checkbox" id="debug-money"> Money pile</label>
                <label><input type="checkbox" id="debug-creature"> Slow creature</label>
            </div>
            <div class="debug-group">
                <span class="debug-group-title">Meadow Environment</span>
                <label>
                    Location
                    <select id="debug-location">
                        <option value="local">Local browser location</option>
                        <option value="sheffield">Shefffield UK</option>
                        <option value="manila">Manilla</option>
                        <option value="moscow">Moscow</option>
                        <option value="sydney">Sydney Australia</option>
                    </select>
                </label>
                <label>
                    Meadow time
                    <input type="time" id="debug-meadow-time">
                </label>
                <label><input type="checkbox" id="debug-system-time" checked> Use system time</label>
                <span class="debug-group-title">Weather effects</span>
                <label><input type="checkbox" id="debug-weather-clear"> Clear</label>
                <label><input type="checkbox" id="debug-weather-cloudy"> Cloudy</label>
                <label><input type="checkbox" id="debug-weather-rain"> Rain</label>
                <label><input type="checkbox" id="debug-weather-snow"> Snow</label>
                <label><input type="checkbox" id="debug-weather-fog"> Fog</label>
                <label><input type="checkbox" id="debug-weather-storm"> Storm</label>
                <label><input type="checkbox" id="debug-weather-windy"> Windy</label>
            </div>
        </div>
    </details>

    <script src="dist/index.js"></script>
</body>
</html>
